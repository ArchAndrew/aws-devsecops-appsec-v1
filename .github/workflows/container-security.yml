name: container-security

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t devsecops-backend:ci ./app/backend

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devsecops-backend:ci
          format: table
          exit-code: 0
          ignore-unfixed: true
          severity: CRITICAL,HIGH